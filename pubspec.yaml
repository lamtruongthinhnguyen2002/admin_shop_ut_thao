name: admin_shop_ut_thao
description: Hệ thống quản lý đơn hàng

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # Routing
  go_router: ^13.0.0

  # Charts
  fl_chart: ^0.67.0

  # Tables
  data_table_2: ^2.5.14

  # QR
  qr_flutter: ^4.1.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Format tiền
  intl: ^0.19.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  mobile_scanner: ^7.2.0
  shared_preferences: ^2.5.5

flutter:
  uses-material-design: true
  # ↑ BẮT BUỘC - đảm bảo Material Icons font được nhúng vào Web build

  fonts:
    - family: Google Sans
      fonts:
        - asset: fonts/GoogleSans-Regular.ttf
        - asset: fonts/GoogleSans-Bold.ttf
          weight: 700
dev_dependencies:
  flutter_test:
    sdk: flutter
